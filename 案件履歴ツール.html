<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>案件履歴</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Hiragino Sans', sans-serif; background: #f5f6fa; min-height: 100vh; color: #1a1a2e; }

/* ヘッダー */
.header {
  background: #fff; border-bottom: 1px solid #e5e7eb;
  padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
.back-btn { background: #f3f4f6; border: none; border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; color: #374151; }
.back-btn:hover { background: #e5e7eb; }
.header-title { font-size: 16px; font-weight: 800; color: #111; }
.header-spacer { flex: 1; }
.view-toggle { display: flex; gap: 3px; }
.view-btn { padding: 5px 12px; border-radius: 7px; border: 1.5px solid #e5e7eb; font-size: 12px; font-weight: 600; cursor: pointer; background: #f9fafb; color: #6b7280; }
.view-btn.active { background: #111827; color: #fff; border-color: #111827; }

/* 検索バー */
.search-bar {
  background: #fff; border-bottom: 1px solid #e5e7eb;
  padding: 10px 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.month-input, .search-input, .filter-select {
  padding: 7px 10px; border: 1.5px solid #d1d5db; border-radius: 8px;
  font-size: 13px; font-family: inherit; outline: none; background: #fff;
}
.month-input:focus, .search-input:focus, .filter-select:focus { border-color: #6366f1; }
.search-input { flex: 1; min-width: 160px; }
.search-btn { padding: 7px 16px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.search-btn:hover { background: #4338ca; }
.csv-btn { padding: 7px 12px; background: #fff; color: #374151; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.csv-btn:hover { background: #f3f4f6; }
.count-label { font-size: 12px; color: #9ca3af; align-self: center; white-space: nowrap; }

/* サマリーバー */
.summary-bar {
  background: linear-gradient(135deg, #f0f4ff, #faf5ff);
  border-bottom: 1px solid #e5e7eb;
  padding: 8px 16px; display: flex; gap: 20px; flex-wrap: wrap;
}
.summary-item { font-size: 12px; color: #6b7280; }
.summary-item strong { color: #111; font-size: 14px; }
.summary-item .profit-val { color: #059669; }
.summary-item .price-val  { color: #4f46e5; }

/* コンテンツ */
.content { padding: 14px 16px; max-width: 1300px; margin: 0 auto; }

/* ローディング */
.loading { text-align: center; padding: 60px 20px; color: #9ca3af; font-size: 14px; }
.spinner { width: 32px; height: 32px; border: 3px solid #e5e7eb; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { background: #fef2f2; border: 1px solid #fca5a5; border-radius: 10px; padding: 16px; color: #dc2626; font-size: 13px; margin: 16px 0; }

/* テーブル */
.cases-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
.cases-table th {
  background: #f8fafc; padding: 9px 12px; font-size: 11px; font-weight: 700;
  color: #6b7280; text-align: left; border-bottom: 1.5px solid #e5e7eb;
  white-space: nowrap; cursor: pointer; user-select: none;
}
.cases-table th:hover { color: #374151; }
.cases-table td { padding: 9px 12px; font-size: 13px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
.cases-table tr:last-child td { border-bottom: none; }
.cases-table tr.case-row:hover td { background: #fafbff; }
.cases-table tr.editing td { background: #eff6ff !important; }

/* ステータス */
.s-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.s-未着手  { background: #f3f4f6; color: #6b7280; }
.s-進行中  { background: #dbeafe; color: #1d4ed8; }
.s-完了    { background: #dcfce7; color: #15803d; }
.s-請求済み { background: #fef9c3; color: #92400e; }
.s-default { background: #f3f4f6; color: #6b7280; }

/* 金額セル */
.num-cell { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
.profit-cell { font-weight: 700; color: #059669; }
.price-only  { font-weight: 600; color: #4f46e5; }
.zero-cell   { color: #d1d5db; }

/* アクションボタン */
.row-btns { display: flex; gap: 4px; }
.rb { padding: 3px 9px; border-radius: 6px; border: 1.5px solid #e5e7eb; font-size: 11px; font-weight: 600; cursor: pointer; background: #fff; color: #374151; white-space: nowrap; }
.rb:hover { background: #f3f4f6; }
.rb-edit { border-color: #a5b4fc; color: #4f46e5; }
.rb-edit:hover { background: #eff6ff; }
.rb-del  { border-color: #fca5a5; color: #dc2626; }
.rb-del:hover  { background: #fef2f2; }

/* 編集パネル */
.edit-panel { background: #eff6ff; padding: 14px 16px; border-bottom: 2px solid #c7d2fe; }
.ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 12px; }
.ep-field label { display: block; font-size: 11px; font-weight: 700; color: #6b7280; margin-bottom: 3px; }
.ep-field input, .ep-field select, .ep-field textarea {
  width: 100%; padding: 6px 9px; border: 1.5px solid #c7d2fe;
  border-radius: 7px; font-size: 13px; font-family: inherit; background: #fff; outline: none;
}
.ep-field input:focus, .ep-field select:focus, .ep-field textarea:focus { border-color: #6366f1; }
.ep-field textarea { resize: vertical; min-height: 50px; }
.ep-actions { display: flex; gap: 8px; }
.ep-save { padding: 7px 18px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.ep-save:hover { background: #4338ca; }
.ep-cancel { padding: 7px 13px; background: #fff; color: #374151; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 13px; cursor: pointer; }
.ep-cancel:hover { background: #f3f4f6; }
.ep-saving { opacity: 0.6; pointer-events: none; }

/* 顧客別カード */
.cards { display: flex; flex-direction: column; gap: 14px; }
.ccard { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
.ccard-hdr {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 16px; background: #f8fafc; border-bottom: 1.5px solid #e5e7eb;
  cursor: pointer; user-select: none;
}
.ccard-hdr:hover { background: #f0f4ff; }
.ccard-name { font-size: 14px; font-weight: 700; flex: 1; }
.ccard-cnt  { font-size: 12px; color: #9ca3af; }
.ccard-profit { font-size: 13px; font-weight: 700; color: #059669; }
.ccard-price  { font-size: 12px; color: #6b7280; }
.ccard-chev { color: #9ca3af; font-size: 13px; transition: transform 0.2s; }
.ccard.collapsed .ccard-chev { transform: rotate(-90deg); }
.ccard.collapsed .ccard-body { display: none; }
.ccard-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px; border-bottom: 1px solid #f3f4f6; font-size: 13px;
}
.ccard-row:last-of-type { border-bottom: none; }
.ccard-row:hover { background: #fafbff; }
.cc-num  { font-weight: 600; color: #4f46e5; min-width: 70px; font-size: 12px; }
.cc-note { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #374151; font-size: 12px; }
.cc-date { font-size: 11px; color: #9ca3af; white-space: nowrap; }
.cc-profit { font-weight: 700; color: #059669; min-width: 80px; text-align: right; font-size: 12px; white-space: nowrap; }
.cc-price  { color: #6b7280; min-width: 70px; text-align: right; font-size: 11px; white-space: nowrap; }

/* 請求書ゾーン */
.inv-zone {
  padding: 11px 16px; background: #f8fafc;
  border-top: 1.5px dashed #e5e7eb;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.inv-lbl { font-size: 12px; color: #6b7280; white-space: nowrap; }
.inv-date { padding: 5px 9px; border: 1.5px solid #d1d5db; border-radius: 7px; font-size: 12px; font-family: inherit; outline: none; }
.inv-date:focus { border-color: #6366f1; }
.inv-btn { padding: 6px 14px; background: #111827; color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.inv-btn:hover { background: #1f2937; }
.inv-csv  { padding: 6px 12px; background: #fff; color: #374151; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.inv-csv:hover  { background: #f3f4f6; }
.inv-rec  { padding: 6px 12px; background: #eff6ff; color: #2563eb; border: 1.5px solid #bfdbfe; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.inv-rec:hover  { background: #dbeafe; }
.inv-total { font-size: 13px; font-weight: 700; color: #111; margin-left: auto; white-space: nowrap; }

/* トースト */
.toast {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: #1f2937; color: #fff; padding: 9px 18px; border-radius: 10px;
  font-size: 13px; font-weight: 600; z-index: 9999;
  opacity: 0; transition: opacity 0.18s, transform 0.18s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.empty-msg { text-align: center; padding: 50px 20px; color: #9ca3af; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">← 戻る</button>
  <span class="header-title">📋 案件履歴</span>
  <div class="header-spacer"></div>
  <div class="view-toggle">
    <button class="view-btn active" id="vbList"  onclick="setView('list')">一覧</button>
    <button class="view-btn"        id="vbGroup" onclick="setView('group')">顧客別</button>
  </div>
</div>

<div class="search-bar">
  <input class="month-input" type="month" id="monthPicker" oninput="doSearch()">
  <input class="search-input" id="searchQ" placeholder="案件番号で検索…"
         onkeydown="if(event.key==='Enter') doSearch()">
  <select class="filter-select" id="statusFilter" onchange="doSearch()">
    <option value="">全ステータス</option>
    <option value="未着手">未着手</option>
    <option value="進行中">進行中</option>
    <option value="完了">完了</option>
    <option value="請求済み">請求済み</option>
  </select>
  <button class="search-btn" onclick="doSearch()">🔍 検索</button>
  <button class="csv-btn" onclick="exportCSV(allCases,'案件履歴.csv')">📥 CSV</button>
  <span class="count-label" id="countLbl"></span>
</div>

<div class="summary-bar" id="summaryBar" style="display:none"></div>

<div class="content" id="mainContent">
  <div class="loading"><div class="spinner"></div>読み込み中…</div>
</div>

<div class="toast" id="toastEl"></div>

<script>
// サーバーURL（同一オリジンから配信される想定）
const SERVER = '';

let allCases = [];
let viewMode = 'list';
let sortKey  = 'date';
let sortAsc  = false;

// ===== 初期化：当月をデフォルト =====
(function initMonth() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  document.getElementById('monthPicker').value = `${y}-${m}`;
})();

// ===== ユーティリティ =====
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtYen(n) {
  if (n === null || n === undefined || n === '') return '―';
  return '¥' + Number(n).toLocaleString();
}
function fmtDate(d) { return d ? d.replace(/-/g, '/') : '―'; }
function sClass(s) {
  if (!s) return 's-default';
  if (s.includes('未着手')) return 's-未着手';
  if (s.includes('進行'))   return 's-進行中';
  if (s.includes('完了'))   return 's-完了';
  if (s.includes('請求'))   return 's-請求済み';
  return 's-default';
}
// 粗利テキストから利益額を取得（サーバーから profit フィールドで来る）
function getProfit(c) { return c.profit ?? null; }
// 表示用：粗利があれば粗利、なければ単価
function displayAmt(c) { return getProfit(c) ?? c.price ?? null; }

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ===== API =====
async function apiFetch(path, opts) {
  const r = await fetch(SERVER + path, { signal: AbortSignal.timeout(20000), ...opts });
  if (!r.ok) {
    const t = await r.text().catch(() => '');
    throw new Error(`HTTP ${r.status}: ${t.slice(0, 100)}`);
  }
  return r;
}

async function doSearch() {
  const month  = document.getElementById('monthPicker').value;
  const q      = document.getElementById('searchQ').value.trim();
  const status = document.getElementById('statusFilter').value;

  document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div>取得中…</div>';
  document.getElementById('summaryBar').style.display = 'none';

  const p = new URLSearchParams();
  if (month)  p.set('month', month);
  if (q)      p.set('q', q);
  if (status) p.set('status', status);

  try {
    const r = await apiFetch(`/api/cases/list?${p}`);
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'サーバーエラー');
    allCases = d.cases || [];
    document.getElementById('countLbl').textContent = `${allCases.length}件`;
    renderSummary();
    render();
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      `<div class="error-msg">⚠️ 読み込み失敗: ${esc(e.message)}<br><small>サーバーが起動しているか確認してください</small></div>`;
  }
}

function renderSummary() {
  const bar = document.getElementById('summaryBar');
  if (!allCases.length) { bar.style.display = 'none'; return; }
  const totalPrice  = allCases.reduce((s, c) => s + (Number(c.price) || 0), 0);
  const profitCases = allCases.filter(c => c.profit !== null && c.profit !== undefined);
  const totalProfit = profitCases.reduce((s, c) => s + (Number(c.profit) || 0), 0);
  bar.style.display = 'flex';
  bar.innerHTML = `
    <div class="summary-item">件数 <strong>${allCases.length}</strong></div>
    <div class="summary-item">売上合計 <strong class="price-val">${fmtYen(totalPrice)}</strong></div>
    ${profitCases.length ? `<div class="summary-item">粗利合計 <strong class="profit-val">${fmtYen(totalProfit)}</strong>
      <span style="font-size:11px;color:#9ca3af">（${profitCases.length}件）</span></div>` : ''}
  `;
}

// ===== ビュー切替 =====
function setView(mode) {
  viewMode = mode;
  document.getElementById('vbList').classList.toggle('active', mode === 'list');
  document.getElementById('vbGroup').classList.toggle('active', mode === 'group');
  render();
}
function render() {
  if (viewMode === 'list') renderList();
  else renderGroup();
}

// ===== ソート =====
function setSort(key) {
  sortAsc = (sortKey === key) ? !sortAsc : false;
  sortKey = key;
  render();
}
function sorted(arr) {
  return [...arr].sort((a, b) => {
    let va = a[sortKey] ?? ''; let vb = b[sortKey] ?? '';
    if (sortKey === 'price' || sortKey === 'profit') { va = Number(va)||0; vb = Number(vb)||0; }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

// ===== 一覧レンダー =====
function renderList() {
  const mc = document.getElementById('mainContent');
  if (!allCases.length) { mc.innerHTML = '<div class="empty-msg">案件が見つかりませんでした。<br>月や検索条件を変更してください。</div>'; return; }
  const arr = sorted(allCases);
  const sa = sortAsc ? ' ▲' : ' ▼';
  const sh = k => sortKey === k ? sa : '';
  let html = `<table class="cases-table"><thead><tr>
    <th onclick="setSort('number')">案件番号${sh('number')}</th>
    <th onclick="setSort('customer')">客番号${sh('customer')}</th>
    <th onclick="setSort('customerName')">客名${sh('customerName')}</th>
    <th onclick="setSort('profit')">粗利/単価${sh('profit')}</th>
    <th onclick="setSort('status')">進捗${sh('status')}</th>
    <th onclick="setSort('date')">締切日${sh('date')}</th>
    <th>備考/素材名</th>
    <th>操作</th>
  </tr></thead><tbody>`;

  for (const c of arr) {
    const profit = getProfit(c);
    const amtHtml = profit !== null
      ? `<div class="num-cell profit-cell">${fmtYen(profit)}</div>
         <div class="num-cell" style="font-size:11px;color:#9ca3af">単価 ${fmtYen(c.price)}</div>`
      : `<div class="num-cell ${c.price ? 'price-only' : 'zero-cell'}">${fmtYen(c.price)}</div>`;
    html += `<tr class="case-row" id="row-${c.id}">
      <td><a href="${esc(c.url)}" target="_blank" style="color:#4f46e5;font-weight:700;text-decoration:none;font-size:12px">${esc(c.number||'―')}</a></td>
      <td style="font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap">${esc(c.customer||'―')}</td>
      <td style="font-size:13px;white-space:nowrap">${esc(c.customerName||'')}</td>
      <td>${amtHtml}</td>
      <td><span class="s-badge ${sClass(c.status)}">${esc(c.status||'―')}</span></td>
      <td style="font-size:12px;color:#6b7280">${fmtDate(c.date)}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px" title="${esc(c.note)}">${esc(c.note||'')}</td>
      <td><div class="row-btns">
        <button class="rb rb-edit" onclick="toggleEdit('${c.id}')">✏️ 編集</button>
        <button class="rb rb-del"  onclick="confirmDel('${c.id}')">🗑️</button>
      </div></td>
    </tr>
    <tr id="erow-${c.id}" style="display:none"><td colspan="7" style="padding:0">${buildEP(c)}</td></tr>`;
  }
  html += '</tbody></table>';
  mc.innerHTML = html;
}

function buildEP(c) {
  const statuses = ['未着手','進行中','完了','請求済み'];
  const opts = statuses.map(s => `<option value="${s}"${c.status===s?' selected':''}>${s}</option>`).join('');
  // 外注費を粗利テキストから逆算（例: "10,000 - 3,000 = 7,000" → 3,000）
  let cost = '';
  if (c.gross) {
    const m = c.gross.match(/[\d,]+\s*-\s*([\d,]+)/);
    if (m) cost = m[1].replace(/,/g, '');
  }
  return `<div class="edit-panel" id="ep-${c.id}">
    <div class="ep-grid">
      <div class="ep-field"><label>案件番号</label><input id="ef-num-${c.id}"    value="${esc(c.number)}"></div>
      <div class="ep-field"><label>お客様No/名</label><input id="ef-cust-${c.id}" value="${esc(c.customer)}"></div>
      <div class="ep-field"><label>単価（円）</label><input id="ef-price-${c.id}" type="number" value="${c.price||''}"></div>
      <div class="ep-field"><label>外注費（円）</label><input id="ef-cost-${c.id}" type="number" value="${cost}" placeholder="なければ空欄"></div>
      <div class="ep-field"><label>進捗</label><select id="ef-status-${c.id}">${opts}</select></div>
      <div class="ep-field"><label>締切日</label><input id="ef-date-${c.id}" type="date" value="${c.date||''}"></div>
      <div class="ep-field"><label>備考/素材名</label><input id="ef-note-${c.id}" value="${esc(c.note)}"></div>
      <div class="ep-field"><label>ファイル名</label><input id="ef-file-${c.id}" value="${esc(c.filename)}"></div>
      <div class="ep-field" style="grid-column:1/-1"><label>備考</label><textarea id="ef-memo-${c.id}">${esc(c.memo)}</textarea></div>
    </div>
    <div class="ep-actions">
      <button class="ep-save" onclick="saveEdit('${c.id}')">💾 Notionに保存</button>
      <button class="ep-cancel" onclick="toggleEdit('${c.id}')">キャンセル</button>
    </div>
  </div>`;
}

function toggleEdit(id) {
  const erow = document.getElementById(`erow-${id}`);
  const row  = document.getElementById(`row-${id}`);
  if (!erow) return;
  const open = erow.style.display === 'none';
  document.querySelectorAll('[id^="erow-"]').forEach(r => r.style.display = 'none');
  document.querySelectorAll('.case-row.editing').forEach(r => r.classList.remove('editing'));
  if (open) { erow.style.display = ''; row?.classList.add('editing'); }
}

async function saveEdit(id) {
  const ep = document.getElementById(`ep-${id}`);
  if (!ep) return;
  ep.classList.add('ep-saving');
  const fields = {
    number:       document.getElementById(`ef-num-${id}`)?.value.trim(),
    customer:     document.getElementById(`ef-cust-${id}`)?.value.trim(),
    price:        document.getElementById(`ef-price-${id}`)?.value,
    outsourceCost:document.getElementById(`ef-cost-${id}`)?.value,
    status:       document.getElementById(`ef-status-${id}`)?.value,
    date:         document.getElementById(`ef-date-${id}`)?.value,
    note:         document.getElementById(`ef-note-${id}`)?.value.trim(),
    filename:     document.getElementById(`ef-file-${id}`)?.value.trim(),
    memo:         document.getElementById(`ef-memo-${id}`)?.value.trim(),
  };
  try {
    const r = await apiFetch('/api/cases/update', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id, ...fields }),
    });
    const d = await r.json();
    if (d.ok) {
      // ローカル更新
      const c = allCases.find(x => x.id === id);
      if (c) {
        const price = Number(fields.price) || 0;
        const cost  = Number(fields.outsourceCost) || 0;
        Object.assign(c, {
          number: fields.number, customer: fields.customer,
          price, status: fields.status, date: fields.date,
          note: fields.note, filename: fields.filename, memo: fields.memo,
          profit: (fields.outsourceCost !== '' && fields.price !== '') ? price - cost : null,
          gross: (fields.outsourceCost && fields.price)
            ? `${price.toLocaleString()} - ${cost.toLocaleString()} = ${(price-cost).toLocaleString()}`
            : '',
        });
      }
      toast('✅ 保存しました');
      toggleEdit(id);
      renderSummary();
      render();
    } else {
      toast(`⚠️ 保存失敗: ${d.error}`);
      ep.classList.remove('ep-saving');
    }
  } catch(e) {
    toast(`⚠️ エラー: ${e.message}`);
    ep.classList.remove('ep-saving');
  }
}

async function confirmDel(id) {
  const c = allCases.find(x => x.id === id);
  if (!confirm(`「${c?.number || '案件'}」をNotionから完全に削除しますか？\n\n元に戻せません。`)) return;
  try {
    const r = await apiFetch('/api/calendar/delete', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id }),
    });
    const d = await r.json();
    if (d.ok) {
      allCases = allCases.filter(x => x.id !== id);
      document.getElementById('countLbl').textContent = `${allCases.length}件`;
      toast('🗑️ 削除しました');
      renderSummary(); render();
    } else {
      toast(`⚠️ 削除失敗: ${d.error}`);
    }
  } catch(e) { toast(`⚠️ エラー: ${e.message}`); }
}

// ===== 顧客別ビュー =====
function renderGroup() {
  const mc = document.getElementById('mainContent');
  if (!allCases.length) { mc.innerHTML = '<div class="empty-msg">案件が見つかりませんでした</div>'; return; }
  const groups = {};
  for (const c of allCases) {
    const key = c.customer || '（顧客なし）';
    if (!groups[key]) groups[key] = {
      customer: key,
      customerName: c.customerName || '',
      cases: [], totalPrice: 0, totalProfit: 0, profitCount: 0
    };
    groups[key].cases.push(c);
    groups[key].totalPrice += Number(c.price) || 0;
    if (c.profit !== null && c.profit !== undefined) {
      groups[key].totalProfit += Number(c.profit) || 0;
      groups[key].profitCount++;
    }
  }
  const today = new Date().toISOString().slice(0, 10);
  let html = '<div class="cards">';
  for (const [cust, g] of Object.entries(groups)) {
    const cid = 'cg_' + btoa(encodeURIComponent(cust)).replace(/[^a-zA-Z0-9]/g, '');
    const profitLabel = g.profitCount > 0
      ? `<span class="ccard-profit">${fmtYen(g.totalProfit)}</span><span class="ccard-price"> 売上 ${fmtYen(g.totalPrice)}</span>`
      : `<span class="ccard-price">${fmtYen(g.totalPrice)}</span>`;
    html += `<div class="ccard" id="${cid}">
      <div class="ccard-hdr" onclick="toggleCard('${cid}')">
        <span class="ccard-name">${esc(g.customer)}<span style="font-size:12px;color:#6b7280;font-weight:500;margin-left:6px">${esc(g.customerName)}</span></span>
        <span class="ccard-cnt">${g.cases.length}件</span>
        ${profitLabel}
        <span class="ccard-chev">▼</span>
      </div>
      <div class="ccard-body">`;
    for (const c of g.cases) {
      const profit = getProfit(c);
      const amtHtml = profit !== null
        ? `<span class="cc-profit">${fmtYen(profit)}</span><span class="cc-price">${fmtYen(c.price)}</span>`
        : `<span class="cc-price" style="color:#4f46e5;font-weight:600">${fmtYen(c.price)}</span>`;
      html += `<div class="ccard-row">
        <span class="cc-num">${esc(c.number||'')}</span>
        <span class="cc-note" title="${esc(c.note)}">${esc(c.note||c.number||'')}</span>
        <span class="cc-date">${fmtDate(c.date)}</span>
        ${amtHtml}
        <span class="s-badge ${sClass(c.status)}" style="font-size:10px">${esc(c.status||'―')}</span>
        <div class="row-btns" style="margin-left:4px">
          <button class="rb rb-edit" onclick="editFromGroup('${c.id}')">✏️</button>
          <button class="rb rb-del"  onclick="confirmDel('${c.id}')">🗑️</button>
        </div>
      </div>`;
    }
    html += `<div class="inv-zone">
        <span class="inv-lbl">請求日</span>
        <input class="inv-date" type="date" id="id-${cid}" value="${today}">
        <button class="inv-btn" onclick="issueXLSX('${esc(cust)}','${cid}')">📄 請求書 XLSX</button>
        <button class="inv-csv" onclick="exportCSV(allCases.filter(x=>x.customer==='${esc(cust)}'),'${esc(cust)}_案件.csv')">CSV</button>
        <button class="inv-rec" onclick="recordNotion('${esc(cust)}','${cid}')">📝 Notionに記録</button>
        <span class="inv-total">請求: ${fmtYen(g.totalPrice)}</span>
      </div>
    </div></div>`;
  }
  html += '</div>';
  mc.innerHTML = html;
}

function toggleCard(cid) {
  document.getElementById(cid)?.classList.toggle('collapsed');
}

function editFromGroup(id) {
  setView('list');
  setTimeout(() => {
    toggleEdit(id);
    document.getElementById(`row-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 80);
}

// ===== 請求書発行 =====
async function issueXLSX(cust, cid) {
  const dateEl = document.getElementById(`id-${cid}`);
  if (!dateEl?.value) { toast('⚠️ 請求日を入力してください'); return; }
  const d = new Date(dateEl.value);
  const invDate = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  const cases = allCases.filter(c => c.customer === cust && c.price > 0);
  if (!cases.length) { toast('⚠️ 金額のある案件がありません'); return; }
  const custNo = cust.replace(/[様御中]/g, '').trim();
  toast('📄 XLSX生成中…');
  try {
    const r = await apiFetch('/api/generate-invoice', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        customerNo: custNo, customerName: cust, invoiceDate: invDate,
        cases: cases.map(c => ({ number: c.number, note: c.note || c.number, amount: c.price })),
      }),
    });
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const cd = r.headers.get('Content-Disposition') || '';
    const m = cd.match(/filename\*=UTF-8''([^;]+)/);
    a.href = url; a.download = m ? decodeURIComponent(m[1]) : `${custNo}_請求書.xlsx`;
    a.click(); URL.revokeObjectURL(url);
    toast('✅ 請求書をダウンロードしました');
  } catch(e) { toast(`⚠️ 発行失敗: ${e.message}`); }
}

async function recordNotion(cust, cid) {
  const dateEl = document.getElementById(`id-${cid}`);
  if (!dateEl?.value) { toast('⚠️ 請求日を入力してください'); return; }
  const d = new Date(dateEl.value);
  const invDate = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  const month   = `${d.getFullYear()}年${d.getMonth()+1}月`;
  const cases   = allCases.filter(c => c.customer === cust && c.price > 0);
  const total   = cases.reduce((s, c) => s + (Number(c.price)||0), 0);
  const custNo  = cust.replace(/[様御中]/g, '').trim();
  toast('📝 Notionに記録中…');
  try {
    const r = await apiFetch('/api/record-invoice', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        invoiceDate: invDate,
        records: [{ customerNo: custNo, amount: total, month, caseNumbers: cases.map(c=>c.number) }],
      }),
    });
    const d2 = await r.json();
    if (d2.ok) toast('✅ Notionに記録しました');
    else toast(`⚠️ 記録失敗`);
  } catch(e) { toast(`⚠️ エラー: ${e.message}`); }
}

// ===== CSV =====
function exportCSV(cases, filename) {
  if (!cases?.length) { toast('⚠️ データなし'); return; }
  const heads = ['案件番号','客番号','客名','単価','粗利','進捗','締切日','備考/素材名','ファイル名','備考'];
  const rows = cases.map(c => [
    c.number, c.customer, c.customerName||'', c.price, c.profit??'', c.status, c.date, c.note, c.filename, c.memo
  ].map(v => `"${String(v??'').replace(/"/g,'""')}"`));
  const csv = [heads.join(','), ...rows.map(r=>r.join(','))].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
  toast('📥 CSVダウンロード完了');
}
